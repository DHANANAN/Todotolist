<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        h2 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        /* Auth Forms */
        .auth-container {
            display: none;
        }

        .auth-container.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .switch-auth {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .switch-auth a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-auth a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #ffe5e5;
            color: #d63031;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #e5ffe5;
            color: #00b894;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Todo App Styles */
        .todo-container {
            display: none;
        }

        .todo-container.active {
            display: block;
        }

        .user-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-email {
            color: #555;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #ff5252;
        }

        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #todoInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #todoInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        #todoList {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border-radius: 8px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #888;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            word-break: break-word;
        }

        .delete-btn {
            padding: 6px 12px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ff3838;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 16px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .clear-completed {
            padding: 8px 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .clear-completed:hover {
            background: #ff5252;
        }

        .clear-completed:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }

        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .strength-weak { background: #ff4757; width: 33%; }
        .strength-medium { background: #ffa502; width: 66%; }
        .strength-strong { background: #26de81; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginContainer" class="auth-container active">
            <h1>Welcome Back!</h1>
            <h2>Login to Your Account</h2>
            
            <div id="loginError" class="error-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="auth-btn">Login</button>
            </form>
            
            <div class="switch-auth">
                Don't have an account? <a id="showSignup">Sign Up</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupContainer" class="auth-container">
            <h1>Join Us!</h1>
            <h2>Create Your Account</h2>
            
            <div id="signupError" class="error-message"></div>
            <div id="signupSuccess" class="success-message"></div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a strong password" required autocomplete="new-password">
                    <div class="strength-bar">
                        <div id="strengthFill" class="strength-fill"></div>
                    </div>
                    <div id="passwordStrength" class="password-strength"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required autocomplete="new-password">
                </div>
                
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
            
            <div class="switch-auth">
                Already have an account? <a id="showLogin">Login</a>
            </div>
        </div>

        <!-- Todo App -->
        <div id="todoContainer" class="todo-container">
            <h1>My To-Do List</h1>

            <div class="user-info">
                <span class="user-email" id="currentUserEmail"></span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>

            <div class="input-container">
                <input type="text" id="todoInput" placeholder="Add a new task..." autocomplete="off">
                <button id="addBtn">Add</button>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="todoList"></ul>

            <div class="stats">
                <span id="itemCount">0 items left</span>
                <button class="clear-completed" id="clearCompleted">Clear Completed</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Authentication System ====================
        
        class AuthSystem {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('users')) || [];
                this.currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
            }

            // Hash password (simple implementation - in production use proper hashing)
            hashPassword(password) {
                let hash = 0;
                for (let i = 0; i < password.length; i++) {
                    const char = password.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return hash.toString(36);
            }

            // Validate email format
            validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            // Check password strength
            checkPasswordStrength(password) {
                let strength = 0;
                if (password.length >= 8) strength++;
                if (password.length >= 12) strength++;
                if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
                if (/\d/.test(password)) strength++;
                if (/[^a-zA-Z\d]/.test(password)) strength++;

                if (strength <= 2) return { level: 'weak', text: 'Weak password' };
                if (strength <= 3) return { level: 'medium', text: 'Medium strength' };
                return { level: 'strong', text: 'Strong password' };
            }

            // Sign up new user
            signup(name, email, password) {
                // Validate email
                if (!this.validateEmail(email)) {
                    return { success: false, message: 'Invalid email format' };
                }

                // Check if user already exists
                if (this.users.find(u => u.email === email)) {
                    return { success: false, message: 'Email already registered' };
                }

                // Validate password strength
                const strength = this.checkPasswordStrength(password);
                if (strength.level === 'weak') {
                    return { success: false, message: 'Password is too weak. Use at least 8 characters with uppercase, lowercase, and numbers.' };
                }

                // Create new user
                const user = {
                    id: Date.now(),
                    name: name,
                    email: email,
                    password: this.hashPassword(password),
                    createdAt: new Date().toISOString()
                };

                this.users.push(user);
                localStorage.setItem('users', JSON.stringify(this.users));

                return { success: true, message: 'Account created successfully!' };
            }

            // Login user
            login(email, password) {
                const user = this.users.find(u => u.email === email);

                if (!user) {
                    return { success: false, message: 'Email not found' };
                }

                if (user.password !== this.hashPassword(password)) {
                    return { success: false, message: 'Incorrect password' };
                }

                this.currentUser = {
                    id: user.id,
                    name: user.name,
                    email: user.email
                };

                localStorage.setItem('currentUser', JSON.stringify(this.currentUser));

                return { success: true, user: this.currentUser };
            }

            // Logout user
            logout() {
                this.currentUser = null;
                localStorage.removeItem('currentUser');
            }

            // Check if user is logged in
            isLoggedIn() {
                return this.currentUser !== null;
            }

            // Get current user
            getCurrentUser() {
                return this.currentUser;
            }
        }

        // ==================== Todo App System ====================

        class TodoApp {
            constructor(userId) {
                this.userId = userId;
                this.storageKey = `todos_${userId}`;
                this.todos = JSON.parse(localStorage.getItem(this.storageKey)) || [];
                this.currentFilter = 'all';
            }

            addTodo(text) {
                const todo = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                this.todos.push(todo);
                this.saveTodos();
                return todo;
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.saveTodos();
                }
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(t => t.id !== id);
                this.saveTodos();
            }

            clearCompleted() {
                this.todos = this.todos.filter(t => !t.completed);
                this.saveTodos();
            }

            getFilteredTodos(filter) {
                switch(filter) {
                    case 'active':
                        return this.todos.filter(t => !t.completed);
                    case 'completed':
                        return this.todos.filter(t => t.completed);
                    default:
                        return this.todos;
                }
            }

            getStats() {
                const active = this.todos.filter(t => !t.completed).length;
                const completed = this.todos.filter(t => t.completed).length;
                return { active, completed, total: this.todos.length };
            }

            saveTodos() {
                localStorage.setItem(this.storageKey, JSON.stringify(this.todos));
            }
        }

        // ==================== UI Controller ====================

        const auth = new AuthSystem();
        let todoApp = null;

        // DOM Elements - Auth
        const loginContainer = document.getElementById('loginContainer');
        const signupContainer = document.getElementById('signupContainer');
        const todoContainer = document.getElementById('todoContainer');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const showSignupBtn = document.getElementById('showSignup');
        const showLoginBtn = document.getElementById('showLogin');
        const logoutBtn = document.getElementById('logoutBtn');

        // DOM Elements - Todo
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const itemCount = document.getElementById('itemCount');
        const clearCompletedBtn = document.getElementById('clearCompleted');
        const currentUserEmail = document.getElementById('currentUserEmail');

        // Initialize app
        function init() {
            // Check if user is already logged in
            if (auth.isLoggedIn()) {
                showTodoApp();
            }

            // Auth event listeners
            loginForm.addEventListener('submit', handleLogin);
            signupForm.addEventListener('submit', handleSignup);
            showSignupBtn.addEventListener('click', () => switchView('signup'));
            showLoginBtn.addEventListener('click', () => switchView('login'));
            logoutBtn.addEventListener('click', handleLogout);

            // Password strength checker
            document.getElementById('signupPassword').addEventListener('input', (e) => {
                const strength = auth.checkPasswordStrength(e.target.value);
                const strengthFill = document.getElementById('strengthFill');
                const strengthText = document.getElementById('passwordStrength');

                strengthFill.className = 'strength-fill strength-' + strength.level;
                strengthText.textContent = strength.text;
            });

            // Todo event listeners
            addBtn.addEventListener('click', handleAddTodo);
            todoInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleAddTodo();
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    if (todoApp) {
                        todoApp.currentFilter = e.target.dataset.filter;
                        renderTodos();
                    }
                });
            });

            clearCompletedBtn.addEventListener('click', () => {
                if (todoApp) {
                    todoApp.clearCompleted();
                    renderTodos();
                    updateStats();
                }
            });
        }

        // Handle login
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const result = auth.login(email, password);

            if (result.success) {
                showTodoApp();
            } else {
                showError('loginError', result.message);
            }
        }

        // Handle signup
        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showError('signupError', 'Passwords do not match');
                return;
            }

            const result = auth.signup(name, email, password);

            if (result.success) {
                showSuccess('signupSuccess', result.message);
                setTimeout(() => {
                    signupForm.reset();
                    switchView('login');
                }, 1500);
            } else {
                showError('signupError', result.message);
            }
        }

        // Handle logout
        function handleLogout() {
            auth.logout();
            todoApp = null;
            switchView('login');
        }

        // Show todo app
        function showTodoApp() {
            const user = auth.getCurrentUser();
            todoApp = new TodoApp(user.id);
            currentUserEmail.textContent = user.email;

            loginContainer.classList.remove('active');
            signupContainer.classList.remove('active');
            todoContainer.classList.add('active');

            renderTodos();
            updateStats();
        }

        // Switch between login and signup
        function switchView(view) {
            if (view === 'login') {
                signupContainer.classList.remove('active');
                loginContainer.classList.add('active');
                clearMessages();
            } else {
                loginContainer.classList.remove('active');
                signupContainer.classList.add('active');
                clearMessages();
            }
        }

        // Show error message
        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }

        // Show success message
        function showSuccess(elementId, message) {
            const successEl = document.getElementById(elementId);
            successEl.textContent = message;
            successEl.classList.add('show');
            setTimeout(() => successEl.classList.remove('show'), 5000);
        }

        // Clear messages
        function clearMessages() {
            document.querySelectorAll('.error-message, .success-message').forEach(el => {
                el.classList.remove('show');
            });
        }

        // Handle add todo
        function handleAddTodo() {
            const text = todoInput.value.trim();
            if (!text || !todoApp) return;

            todoApp.addTodo(text);
            todoInput.value = '';
            renderTodos();
            updateStats();
        }

        // Render todos
        function renderTodos() {
            if (!todoApp) return;

            const filteredTodos = todoApp.getFilteredTodos(todoApp.currentFilter);

            if (filteredTodos.length === 0) {
                todoList.innerHTML = '<div class="empty-state">No tasks to display</div>';
                return;
            }

            todoList.innerHTML = filteredTodos.map(todo => `
                <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}
                           onchange="handleToggleTodo(${todo.id})">
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <button class="delete-btn" onclick="handleDeleteTodo(${todo.id})">Delete</button>
                </li>
            `).join('');
        }

        // Update statistics
        function updateStats() {
            if (!todoApp) return;

            const stats = todoApp.getStats();
            itemCount.textContent = `${stats.active} item${stats.active !== 1 ? 's' : ''} left`;
            clearCompletedBtn.disabled = stats.completed === 0;
        }

        // Global handlers for todo actions
        function handleToggleTodo(id) {
            if (todoApp) {
                todoApp.toggleTodo(id);
                renderTodos();
                updateStats();
            }
        }

        function handleDeleteTodo(id) {
            if (todoApp) {
                todoApp.deleteTodo(id);
                renderTodos();
                updateStats();
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start the app
        init();
    </script>
</body>
</html>
